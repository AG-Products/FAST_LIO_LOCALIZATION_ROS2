/**:
    ros__parameters:
        feature_extract_enable: false #leave this false or break autoware stuff
        point_filter_num: 1 #leave this at one or break autoware stuff
        max_iteration: 3
        filter_size_surf: 0.5
        filter_size_map: 0.5
        cube_side_length: 1000.0
        runtime_pos_log_enable: false
        lidar_frame: "base_link"
        odom_frame: "odom"
        base_link_frame: "base_link"
        publish_tf: true

        common:
            lid_topic:  "/lidar_points_filtered"
            imu_topic:  "/imu/fusion_ready"
            time_sync_en: false         # ONLY turn on when external time synchronization is really not possible
            time_offset_lidar_to_imu: 0.0 # Time offset between lidar and IMU calibrated by other algorithms, e.g. LI-Init (can be found in README).
                                        # This param will take effect no matter what time_sync_en is. So if the time offset is not known exactly, please set as 0.0
            
        preprocess:
            lidar_type: 5                # 1 for Livox serials LiDAR, 2 for Velodyne LiDAR, 3 for ouster LiDAR, 
            scan_line: 16
            timestamp_unit: 3                 # 0-second, 1-milisecond, 2-microsecond, 3-nanosecond.
            blind: 0.0 #leave this at zero or break autoware stuff

        mapping:
            acc_cov: 0.1
            gyr_cov: 0.1
            b_acc_cov: 0.0001
            b_gyr_cov: 0.0001
            fov_degree:    360.0
            det_range:     150.0
            extrinsic_est_en:  true      # true: enable the online estimation of IMU-LiDAR extrinsic
            extrinsic_T: [ 0.0, 0.0, 0.0 ]
            extrinsic_R: [1., 0., 0.,
                        0., 1., 0.,
                        0., 0., 1.]

        publish:
            map_en: true
            path_en:  false
            scan_publish_en:  true       # false: close all the point cloud output
            dense_publish_en: true       # false: low down the points number in a global-frame point clouds scan.
            scan_bodyframe_pub_en: true  # true: output the point cloud scans in IMU-body-frame

        pcd_save:
            pcd_save_en: true  #must be on for any saving to occur
            pcd_save_shutdown: false    # Choose whether to automatically save map on node shutdown BEWARE OVERWRITING. Can still use service call /map_save if disabled
            interval: -1                 # how many LiDAR frames saved in each pcd file; 
                                        # -1 : all frames will be saved in ONE pcd file, may lead to memory crash when having too much frames.
            pcd_save_dir: ./maps
            map_file_name: "latest.pcd"
